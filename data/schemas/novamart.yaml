# novamart.yaml — Structured schema for the example e-commerce dataset
# Source of truth for schema_to_markdown() rendering and schema_profiler validation.

dataset: novamart
display_name: "Example E-Commerce"
domain: e-commerce
date_range: "2024-01-01 to 2024-12-31"

tables:
  # --- Dimension Tables ---

  - name: users
    description: "One row per registered user"
    row_count: 50000
    category: dimension
    columns:
      - { name: user_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: signup_date, type: DATE, nullable: false, description: "Account creation date" }
      - { name: signup_timestamp, type: TIMESTAMP, nullable: false, description: "Exact creation time" }
      - { name: acquisition_channel, type: TEXT, nullable: false, description: "organic, paid_search, social, referral, email, tiktok_ads" }
      - { name: country, type: TEXT, nullable: false, description: "US, UK, CA, DE, AU, other" }
      - { name: device_primary, type: TEXT, nullable: false, description: "web, ios, android" }
      - { name: age_bucket, type: TEXT, nullable: false, description: "18-24, 25-34, 35-44, 45-54, 55+" }
      - { name: gender, type: TEXT, nullable: false, description: "M, F, other, unknown" }

  - name: products
    description: "One row per product SKU"
    row_count: 500
    category: dimension
    columns:
      - { name: product_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: product_name, type: TEXT, nullable: false, description: "Human-readable name" }
      - { name: category, type: TEXT, nullable: false, description: "electronics, home, clothing, beauty, sports, books" }
      - { name: subcategory, type: TEXT, nullable: false, description: "More specific grouping" }
      - { name: price, type: DECIMAL, nullable: false, description: "Retail price USD ($5.99-$499.99)" }
      - { name: cost, type: DECIMAL, nullable: false, description: "Unit cost (40-70% of price)" }
      - { name: is_plus_eligible, type: BOOLEAN, nullable: false, description: "Qualifies for Plus free shipping" }

  - name: promotions
    description: "One row per promotion"
    row_count: 5
    category: dimension
    columns:
      - { name: promo_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: promo_name, type: TEXT, nullable: false, description: "e.g., Summer Sale, Black Friday" }
      - { name: promo_type, type: TEXT, nullable: false, description: "percentage_off" }
      - { name: discount_pct, type: DECIMAL, nullable: false, description: "0.10 - 0.25" }
      - { name: start_date, type: DATE, nullable: false, description: "Promotion start date" }
      - { name: end_date, type: DATE, nullable: false, description: "Promotion end date" }
      - { name: target_segment, type: TEXT, nullable: false, description: "all, new_users" }

  - name: experiments
    description: "One row per A/B test definition"
    row_count: 2
    category: dimension
    columns:
      - { name: experiment_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: experiment_name, type: TEXT, nullable: false, description: "Machine-readable name" }
      - { name: hypothesis, type: TEXT, nullable: false, description: "Testable hypothesis" }
      - { name: primary_metric, type: TEXT, nullable: false, description: "What experiment measures" }
      - { name: start_date, type: DATE, nullable: false, description: "Experiment start date" }
      - { name: end_date, type: DATE, nullable: false, description: "Experiment end date" }
      - { name: status, type: TEXT, nullable: false, description: "completed" }

  # --- Fact / Transactional Tables ---

  - name: events
    description: "One row per behavioral event"
    row_count: 6500000
    category: fact
    columns:
      - { name: event_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: session_id, type: TEXT, nullable: false, description: "Groups events into sessions" }
      - { name: event_type, type: TEXT, nullable: false, description: "page_view, product_view, add_to_cart, checkout_start, purchase, search, review" }
      - { name: timestamp, type: TIMESTAMP, nullable: false, description: "Event time" }
      - { name: product_id, type: INTEGER, nullable: true, description: "FK to products (nullable)" }
      - { name: device, type: TEXT, nullable: false, description: "web, ios, android" }
      - { name: page_url, type: TEXT, nullable: true, description: "Page path" }
      - { name: properties, type: JSON, nullable: true, description: "Event-specific metadata" }

  - name: sessions
    description: "One row per session summary"
    row_count: 1400000
    category: fact
    columns:
      - { name: session_id, type: TEXT, nullable: false, description: "Primary key" }
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: session_start, type: TIMESTAMP, nullable: false, description: "Session start time" }
      - { name: session_end, type: TIMESTAMP, nullable: false, description: "Session end time" }
      - { name: device, type: TEXT, nullable: false, description: "web, ios, android" }
      - { name: page_count, type: INTEGER, nullable: false, description: "Pages viewed" }
      - { name: event_count, type: INTEGER, nullable: false, description: "Total events" }
      - { name: has_purchase, type: BOOLEAN, nullable: false, description: "Whether session included purchase" }

  - name: orders
    description: "One row per order"
    row_count: 40000
    category: fact
    columns:
      - { name: order_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: order_date, type: DATE, nullable: false, description: "Order date" }
      - { name: total_amount, type: DECIMAL, nullable: false, description: "Order total (USD)" }
      - { name: status, type: TEXT, nullable: false, description: "completed, cancelled, refunded" }
      - { name: promo_id, type: INTEGER, nullable: true, description: "FK to promotions (nullable)" }

  - name: order_items
    description: "One row per line item"
    row_count: null
    category: fact
    columns:
      - { name: order_id, type: INTEGER, nullable: false, description: "FK to orders" }
      - { name: product_id, type: INTEGER, nullable: false, description: "FK to products" }
      - { name: quantity, type: INTEGER, nullable: false, description: "Units ordered" }
      - { name: unit_price, type: DECIMAL, nullable: false, description: "Price per unit" }

  - name: memberships
    description: "Plus membership state changes"
    row_count: null
    category: fact
    columns:
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: started_at, type: DATE, nullable: false, description: "Membership start" }
      - { name: ended_at, type: DATE, nullable: true, description: "Membership end (null if active)" }
      - { name: plan_type, type: TEXT, nullable: false, description: "monthly, annual" }

  - name: support_tickets
    description: "One row per support ticket"
    row_count: 20000
    category: fact
    columns:
      - { name: ticket_id, type: INTEGER, nullable: false, description: "Primary key" }
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: category, type: TEXT, nullable: false, description: "Ticket category" }
      - { name: severity, type: TEXT, nullable: false, description: "low, medium, high, critical" }
      - { name: status, type: TEXT, nullable: false, description: "open, resolved, escalated" }
      - { name: created_at, type: TIMESTAMP, nullable: false, description: "Ticket creation time" }
      - { name: resolved_at, type: TIMESTAMP, nullable: true, description: "Resolution time (nullable)" }

  - name: nps_responses
    description: "One row per NPS survey response"
    row_count: 8000
    category: fact
    columns:
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: score, type: INTEGER, nullable: false, description: "0-10 NPS score" }
      - { name: comment, type: TEXT, nullable: true, description: "Free-text feedback" }
      - { name: submitted_at, type: TIMESTAMP, nullable: false, description: "Response time" }
      - { name: device, type: TEXT, nullable: false, description: "web, ios, android" }

  - name: experiment_assignments
    description: "One row per user-experiment assignment"
    row_count: 20000
    category: fact
    columns:
      - { name: user_id, type: INTEGER, nullable: false, description: "FK to users" }
      - { name: experiment_id, type: INTEGER, nullable: false, description: "FK to experiments" }
      - { name: variant, type: TEXT, nullable: false, description: "control, treatment" }
      - { name: assigned_at, type: TIMESTAMP, nullable: false, description: "Assignment time" }

  # --- Helper Tables ---

  - name: calendar
    description: "One row per day in 2024"
    row_count: 366
    category: helper
    columns:
      - { name: date, type: DATE, nullable: false, description: "Calendar date" }
      - { name: day_of_week, type: TEXT, nullable: false, description: "Monday-Sunday" }
      - { name: is_weekend, type: BOOLEAN, nullable: false, description: "Saturday or Sunday" }
      - { name: is_holiday, type: BOOLEAN, nullable: false, description: "US holiday flag" }

relationships:
  - from: users.user_id
    to: [events.user_id, sessions.user_id, orders.user_id, memberships.user_id, support_tickets.user_id, nps_responses.user_id, experiment_assignments.user_id]
    type: one-to-many

  - from: products.product_id
    to: [events.product_id, order_items.product_id]
    type: one-to-many

  - from: orders.order_id
    to: [order_items.order_id]
    type: one-to-many

  - from: promotions.promo_id
    to: [orders.promo_id]
    type: one-to-many

  - from: experiments.experiment_id
    to: [experiment_assignments.experiment_id]
    type: one-to-many

  - from: sessions.session_id
    to: [events.session_id]
    type: one-to-many
